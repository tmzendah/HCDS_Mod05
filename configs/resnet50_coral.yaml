# ResNet50 + CORAL Ordinal Loss

model:
  architecture: resnet50
  pretrained: true
  num_classes: 5
  image_size: 224
  freeze_backbone_epochs: 5
  lr_backbone: 0.00001
  lr_head: 0.0001

loss:
  type: coral
  class_weights: null

training:
  seeds: [42, 123, 456]
  batch_size: 32
  epochs: 50
  early_stopping_patience: 10
  optimizer: adam
  weight_decay: 0.0001
  scheduler: reduce_on_plateau
  scheduler_patience: 5
  scheduler_factor: 0.5

data:
  image_size: 224
  use_clahe: true
  clahe_clip_limit: 2.0
  clahe_tile_grid: [8, 8]
  augmentation:
    random_horizontal_flip: true
    random_rotation: 10

results_dir: results/
