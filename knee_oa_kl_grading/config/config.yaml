# Main configuration — Knee OA KL Grading

# Data
data_dir: data/raw
metadata_dir: data/metadata
processed_dir: data/processed
image_size: 224
use_clahe: true
clahe_clip_limit: 2.0
clahe_tile_grid: [8, 8]

# Dataset splits (patient-level stratified)
train_frac: 0.70
val_frac: 0.15
test_frac: 0.15
samples_per_grade: 2000

# Training
seeds: [42, 123, 456]
batch_size: 32
epochs: 50
early_stopping_patience: 10
num_workers: 4

# Optimiser
optimizer: adam
learning_rate: 0.0001
weight_decay: 0.0001

# Scheduler
scheduler: reduce_on_plateau
scheduler_patience: 5
scheduler_factor: 0.5

# Loss
loss: cross_entropy
class_weights: auto

# Augmentation
augmentation:
  random_horizontal_flip: true
  random_rotation: 10
  color_jitter:
    brightness: 0.2
    contrast: 0.2

# Output paths
checkpoint_dir: checkpoints
results_dir: reports/final_results
figures_dir: reports/final_results
qc_reports_dir: reports/qc_reports
flagged_dir: reports/flagged_images

# External validation
external_data_dir: data/raw/kaggle_oai
